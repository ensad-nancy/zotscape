name: Build and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install PDF cover tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      - run: npx playwright install --with-deps chromium
      - uses: actions/cache@v4
        with:
          path: |
            .cache
            public/media
          key: zotscape-enrichment-${{ runner.os }}-${{ hashFiles('package-lock.json', 'scripts/collect-zotero.mjs') }}-${{ github.run_id }}
          restore-keys: |
            zotscape-enrichment-${{ runner.os }}-${{ hashFiles('package-lock.json', 'scripts/collect-zotero.mjs') }}-
            zotscape-enrichment-${{ runner.os }}-
      - run: npm run collect
        env:
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          ISBNDB_API_KEY: ${{ secrets.ISBNDB_API_KEY }}
          ZOTSCAPE_ENRICH_CONCURRENCY: 4
          ZOTSCAPE_ZOTERO_PAGE_CONCURRENCY: 2
          ZOTSCAPE_SCREENSHOT_CONCURRENCY: 2
          ZOTSCAPE_SCREENSHOT_ATTEMPT_LIMIT: 36
          ZOTSCAPE_WEB_CACHE_TTL_HOURS: 168
          ZOTSCAPE_PRUNE_MEDIA: 1
      - run: npm run audit:data
      - run: GITHUB_PAGES=true npm run build
      - run: npm run smoke
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
